<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado — IAra Farma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0A2E18;
      color: #F8FAFB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h1 span { color: #4ade80; }

    p {
      font-size: 17px;
      color: #9CA3AF;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #16A34A;
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s;
    }

    a.btn:hover { background: #15803d; }

    .brand {
      margin-top: 60px;
      font-size: 13px;
      color: #4B5563;
    }
  </style>
</head>
<body>

  <div class="icon">
    <svg width="32" height="32" fill="none" viewBox="0 0 24 24">
      <path d="M20 6L9 17l-5-5" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Recebemos sua<br><span>solicitação!</span></h1>
  <p>Em breve nossa equipe entrará em contato pelo WhatsApp para agendar sua demonstração gratuita. Fique de olho nas mensagens!</p>

  <a class="btn" href="index.html">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
      <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Voltar para o início
  </a>

  <p class="brand">© 2025 IAra Farma. Todos os direitos reservados.</p>

</body>
</html>
